<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #1a0a2e 60%, #0d0520 100%);
  color: #fff;
  overflow-x: hidden;
}

.screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 2rem 1.5rem;
  animation: fadeIn 0.6s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-10px); }
}
@keyframes sparkle {
  0%,100% { opacity: 0; transform: scale(0) rotate(0deg); }
  50%     { opacity: 1; transform: scale(1) rotate(180deg); }
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  25%     { transform: scale(1.15); }
  50%     { transform: scale(1); }
  75%     { transform: scale(1.1); }
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 18px rgba(255,105,180,0.4), 0 0 36px rgba(255,105,180,0.15); }
  50%     { box-shadow: 0 0 30px rgba(255,105,180,0.7), 0 0 60px rgba(255,105,180,0.35); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes rosePetal {
  0%  { transform: translateY(-50px) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100%{ transform: translateY(110vh) rotate(540deg); opacity: 0; }
}
@keyframes confetti-fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
/* cursor blink */
@keyframes blink {
  0%,100% { opacity: 1; }
  50%     { opacity: 0; }
}

/* Stars & Petals */
.stars-container,
.petals-container {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; overflow: hidden; z-index: 0;
}
.star {
  position: absolute; width: 3px; height: 3px;
  background: #fff; border-radius: 50%;
  animation: sparkle ease-in-out infinite;
}
.petal {
  position: absolute; width: 11px; height: 15px;
  background: radial-gradient(ellipse, #ff69b4, #c71585);
  border-radius: 0 50% 0 50%; opacity: 0;
  animation: rosePetal linear infinite;
}

/* ── Typewriter elements ── */
.tw-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.7rem, 5vw, 3.2rem);
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 1.2rem;
  background: linear-gradient(135deg, #ff9de2, #ffd6f6, #ffb3e6, #ff69b4);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s linear infinite;
  min-height: 1.4em; /* reserve space while typing */
}
.tw-sub {
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  color: rgba(255,220,240,0.85);
  font-weight: 300;
  letter-spacing: 0.03em;
  margin-bottom: 2rem;
  max-width: 440px;
  line-height: 1.75;
  min-height: 1.6em;
}
/* blinking cursor appended while typing */
.tw-cursor {
  display: inline-block;
  width: 2px; height: 1em;
  background: rgba(255,150,200,0.85);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.75s step-end infinite;
  border-radius: 1px;
}
/* invisible placeholder so layout doesn't jump */
.tw-hidden { opacity: 0; pointer-events: none; }

/* Buttons */
.btn {
  padding: 0.9rem 2.4rem; border: none; border-radius: 50px;
  font-family: 'Lato', sans-serif;
  font-size: clamp(0.85rem, 2vw, 1rem);
  font-weight: 400; letter-spacing: 0.07em;
  cursor: pointer; transition: all 0.3s ease;
  text-transform: uppercase; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, #ff69b4, #ff1493, #c71585);
  color: #fff; animation: pulse-glow 2s ease infinite;
}
.btn-primary:hover  { transform: scale(1.05); }
.btn-primary:active { transform: scale(0.97); }

/* fade-in for button after typing finishes */
.btn-reveal {
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.btn-reveal.visible { opacity: 1; transform: translateY(0); }

.btn-yes {
  background: linear-gradient(135deg, #ff69b4, #ff1493);
  color: #fff; padding: 0.9rem 2.2rem;
  font-size: clamp(0.88rem, 2.5vw, 1.05rem);
  animation: pulse-glow 2s ease infinite;
  border: none; border-radius: 50px;
  font-family: 'Lato', sans-serif; letter-spacing: 0.07em;
  cursor: pointer; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0;
  position: relative; z-index: 10; transition: transform 0.25s;
}
.btn-yes:hover { transform: scale(1.07); }

.btn-no {
  background: transparent; color: rgba(255,180,210,0.75);
  border: 1px solid rgba(255,105,180,0.35);
  padding: 0.9rem 2.2rem;
  font-size: clamp(0.88rem, 2.5vw, 1.05rem);
  border-radius: 50px; font-family: 'Lato', sans-serif;
  letter-spacing: 0.07em; cursor: pointer; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0; position: relative; z-index: 5;
  transition: transform 0.22s cubic-bezier(.25,.8,.25,1),
              font-size 0.22s ease, opacity 0.22s ease;
}

/* Emojis */
.emoji-big   { font-size: clamp(3rem,10vw,5rem); display: block; margin-bottom: 1.2rem; animation: float 3s ease-in-out infinite; }
.emoji-heart { font-size: clamp(2.6rem,8vw,4rem); display: block; margin-bottom: 1.2rem; animation: heartbeat 1.5s ease-in-out infinite; }

/* Card */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,105,180,0.25);
  border-radius: 22px;
  padding: clamp(1.3rem, 5vw, 2.4rem);
  max-width: 500px; width: 100%;
  backdrop-filter: blur(10px);
  position: relative; z-index: 1;
}

/* Button arena */
.btn-row {
  display: flex; gap: 1rem; justify-content: center;
  align-items: center; margin-top: 1.2rem;
  position: relative; min-height: 56px; overflow: visible;
}

/* Divider */
.divider {
  width: 56px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,105,180,0.5), transparent);
  margin: 1.3rem auto;
}

/* Tag */
.tag {
  display: inline-block;
  background: rgba(255,105,180,0.18);
  border: 1px solid rgba(255,105,180,0.28);
  border-radius: 20px; padding: 0.28rem 0.75rem;
  font-size: 0.75rem; color: rgba(255,180,210,0.9);
  margin-bottom: 0.9rem; letter-spacing: 0.07em; text-transform: uppercase;
}

/* Progress dots */
.progress-dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 1.6rem; flex-wrap: wrap; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,105,180,0.22); transition: all 0.3s; }
.dot.active { background: #ff69b4; transform: scale(1.35); }
.dot.done   { background: rgba(255,105,180,0.55); }

/* Calendar */
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin: 0.8rem 0; }
.cal-header { font-size: clamp(0.6rem,1.8vw,0.72rem); color: rgba(255,180,210,0.6); padding: 3px 2px; text-align: center; text-transform: uppercase; letter-spacing: 0.02em; }
.cal-day { padding: clamp(5px,1.5vw,8px) 2px; text-align: center; border-radius: 7px; cursor: pointer; font-size: clamp(0.72rem,2vw,0.88rem); color: rgba(255,220,240,0.8); transition: all 0.18s; }
.cal-day:hover    { background: rgba(255,105,180,0.28); color: #fff; }
.cal-day.selected { background: linear-gradient(135deg, #ff69b4, #ff1493); color: #fff; font-weight: 600; }
.cal-day.empty    { cursor: default; }
.cal-day.past     { opacity: 0.28; cursor: default; pointer-events: none; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; }
.cal-nav button { background: rgba(255,105,180,0.18); border: 1px solid rgba(255,105,180,0.28); color: #fff; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.cal-nav button:hover { background: rgba(255,105,180,0.38); }
.cal-nav span { font-family: 'Playfair Display', serif; font-size: clamp(0.9rem,3vw,1.05rem); color: rgba(255,220,240,0.9); }

/* Time picker */
.time-picker { display: flex; gap: 0.8rem; justify-content: center; align-items: center; margin: 0.8rem 0; flex-wrap: wrap; }
.time-picker select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,105,180,0.28); color: #fff; border-radius: 11px; padding: 0.65rem 0.9rem; font-size: clamp(0.9rem,2.5vw,1.05rem); cursor: pointer; font-family: 'Lato', sans-serif; -webkit-appearance: none; text-align: center; min-width: 66px; }
.time-picker select option { background: #2d1b4e; color: #fff; }
.time-sep { font-size: 1.4rem; color: rgba(255,180,210,0.7); }

/* Food input */
.food-input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,105,180,0.28); border-radius: 13px; padding: 0.9rem 1.1rem; color: #fff; font-size: 0.97rem; font-family: 'Lato', sans-serif; outline: none; transition: border-color 0.3s; margin: 0.5rem 0 1.4rem; resize: none; }
.food-input:focus        { border-color: rgba(255,105,180,0.65); }
.food-input::placeholder { color: rgba(255,180,210,0.38); }

/* Final screen */
.final-box { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,105,180,0.32); border-radius: 18px; padding: clamp(1.1rem,4vw,1.8rem); margin: 1.3rem 0; text-align: left; }
.final-row { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.75rem; font-size: clamp(0.88rem,2.5vw,1rem); color: rgba(255,220,240,0.9); }
.final-row .icon { font-size: 1.2rem; flex-shrink: 0; }
.final-row span  { line-height: 1.5; word-break: break-word; }

/* Confetti */
.confetti-piece { position: fixed; width: 9px; height: 9px; border-radius: 2px; animation: confetti-fall 3s ease-in forwards; z-index: 100; pointer-events: none; }

/* ────────────────────────────────
   RESPONSIVE
──────────────────────────────── */
@media (max-width: 768px) {
  .tw-sub { max-width: 100%; }
  .card { max-width: 96vw; }
}
@media (max-width: 480px) {
  .screen { padding: 1.5rem 1rem; justify-content: flex-start; padding-top: 1.8rem; }
  .card { border-radius: 18px; }
  .btn { padding: 0.8rem 1.5rem; }
  .btn-yes, .btn-no { padding: 0.8rem 1.5rem; }
  .btn-row { gap: 0.65rem; min-height: 50px; }
  .progress-dots { margin-bottom: 1.1rem; gap: 5px; }
  .dot { width: 5px; height: 5px; }
  .divider { margin: 1rem auto; }
}
@media (max-width: 360px) {
  .tw-title { font-size: 1.35rem; }
  .tw-sub   { font-size: 0.85rem; }
  .card { padding: 1rem 0.9rem; }
  .btn { padding: 0.72rem 1.2rem; font-size: 0.8rem; }
  .btn-yes, .btn-no { padding: 0.72rem 1.2rem; font-size: 0.8rem; }
  .calendar-grid { gap: 2px; }
  .cal-day    { font-size: 0.68rem; }
  .cal-header { font-size: 0.58rem; }
}
@media (max-height: 520px) and (orientation: landscape) {
  .screen { min-height: auto; padding: 0.8rem 2rem; justify-content: center; }
  .emoji-big   { font-size: 2.4rem; margin-bottom: 0.5rem; }
  .emoji-heart { font-size: 2rem;   margin-bottom: 0.5rem; }
  .tw-title { margin-bottom: 0.6rem; }
  .tw-sub   { margin-bottom: 1rem; }
  .divider  { margin: 0.7rem auto; }
  .card { padding: 1rem 1.5rem; }
  .progress-dots { margin-bottom: 0.7rem; }
}
</style>
</head>
<body>

<div class="petals-container" id="petals"></div>

  <div class="progress-dots">

    <span class="emoji-big">💌</span>
    <h1 class="tw-title" id="t2-title" style="font-size:clamp(1.5rem,4vw,2rem)"></h1>
    <p  class="tw-sub"   id="t2-sub"   style="margin-bottom:1.8rem"></p>

<!-- Screen 3: Ready? -->
<div class="screen" id="s3">
  <div class="progress-dots">
    <div class="dot done"></div><div class="dot done"></div><div class="dot active"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="card">
    <span class="emoji-big">🦋</span>
    <h1 class="tw-title" id="t3-title" style="font-size:clamp(1.5rem,4vw,2rem)"></h1>

<!-- Screen 3.5: Really ready? -->
<div class="screen" id="s3_5">
  <div class="progress-dots">
    <div class="dot done"></div><div class="dot done"></div><div class="dot done"></div>
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="card">
    <span class="emoji-big">🌸</span>
    <h1 class="tw-title" id="t35-title" style="font-size:clamp(1.5rem,4vw,2rem)"></h1>
    <p  class="tw-sub"   id="t35-sub"></p>
    <div class="divider"></div>
    <p  class="tw-sub"   id="t35-sub2" style="font-size:0.92rem;margin-bottom:1.8rem"></p>

  <div class="progress-dots">

    <div class="dot done"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="card" style="max-width:520px">

<script>
const MONTHS_RU  = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

let calYear, calMonth, selDay = null, selMonth = null, selYear = null;
let noRunCount = 0;
let twTimers = []; // track all running timers so we can cancel on navigate

/* ─────────────────────────────────────────
   TYPEWRITER ENGINE
───────────────────────────────────────── */
/**
 * type(el, text, speed, onDone)
 * Supports inline \n as literal line breaks rendered as <br>
 * Supports emoji safely by splitting into grapheme-ish chunks
 */
function type(el, text, speed, onDone) {
  if (!el) { if (onDone) onDone(); return; }
  el.innerHTML = '';

  // Add blinking cursor span
  const cursor = document.createElement('span');
  cursor.className = 'tw-cursor';
  el.appendChild(cursor);

  // Split text preserving emoji (basic grapheme split via Intl if available)
  let chars;
  try {
    chars = [...new Intl.Segmenter().segment(text)].map(s => s.segment);
  } catch(e) {
    chars = [...text];
  }

  let i = 0;
  function tick() {
    if (i >= chars.length) {
      // Remove cursor when done
      cursor.remove();
      if (onDone) onDone();
      return;
    }
    const ch = chars[i++];
    // Insert before cursor
    if (ch === '\n') {
      const br = document.createElement('br');
      el.insertBefore(br, cursor);
    } else {
      // Use a text node for safety
      const tn = document.createTextNode(ch);
      el.insertBefore(tn, cursor);
    }
    const delay = /[.,!?…—]/.test(ch) ? speed * 5 : speed;
    const tid = setTimeout(tick, delay);
    twTimers.push(tid);
  }
  tick();
}


function typeChain(tasks, gap, onAllDone) {
  function run(idx) {
    if (idx >= tasks.length) { if (onAllDone) onAllDone(); return; }
    const {el, text, speed} = tasks[idx];
    type(el, text, speed, () => {
      const tid = setTimeout(() => run(idx + 1), gap);
      twTimers.push(tid);
    });
  }
  run(0);
}

function clearTW() {
  twTimers.forEach(clearTimeout);
  twTimers = [];
}

/* ─────────────────────────────────────────

function go(n) {
  clearTW();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  // Hide all btn-reveal buttons (reset)
  document.querySelectorAll('.btn-reveal').forEach(b => b.classList.remove('visible'));

  const key = 's' + String(n).replace('.','_');
  const screen = document.getElementById(key);
  if (!screen) return;
  screen.classList.add('active');

  if (n === 5) initCalendar();
  if (n === 4) resetNoBtn();

  // Trigger typewriter after fade-in
  const tid = setTimeout(() => {
    if (SCREEN_ANIM[key]) SCREEN_ANIM[key]();
  }, 150);
  twTimers.push(tid);
}

/* ─────────────────────────────────────────

───────────────────────────────────────── */
function initCalendar() {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  const hs = document.getElementById('hourSel');
  if (!hs.options.length) {
    for (let h = 10; h <= 22; h++) {
      const o = document.createElement('option');
      o.textContent = String(h).padStart(2,'0');
      hs.appendChild(o);
    }
    hs.value = '19';
  }
  renderCal();
}
function renderCal() {
  document.getElementById('calTitle').textContent = MONTHS_RU[calMonth] + ' ' + calYear;
  const grid = document.getElementById('calGrid');
  const headers = Array.from(grid.querySelectorAll('.cal-header'));
  grid.innerHTML = '';
  headers.forEach(h => grid.appendChild(h));
  const today = new Date(); today.setHours(0,0,0,0);
  let startDay = new Date(calYear, calMonth, 1).getDay();
  if (startDay === 0) startDay = 7;
  startDay -= 1;
  for (let e = 0; e < startDay; e++) {
    const d = document.createElement('div'); d.className = 'cal-day empty'; grid.appendChild(d);
  }
  const dim = new Date(calYear, calMonth + 1, 0).getDate();
  for (let day = 1; day <= dim; day++) {
    const d = document.createElement('div'); d.className = 'cal-day'; d.textContent = day;
    const td = new Date(calYear, calMonth, day);
    if (td < today) {
      d.classList.add('past');
    } else {
      d.onclick = () => {
        grid.querySelectorAll('.cal-day.selected').forEach(x => x.classList.remove('selected'));
        d.classList.add('selected');
        selDay = day; selMonth = calMonth; selYear = calYear;
      };
    }
    if (selDay === day && selMonth === calMonth && selYear === calYear) d.classList.add('selected');
    grid.appendChild(d);
  }
}
function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth <  0) { calMonth = 11; calYear--; }
  renderCal();
}
